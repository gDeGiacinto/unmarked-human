# Use DecapBridge PKCE auth (required) — generated by decapbridge.com for
# this repo. This replaces the old Netlify Identity + Git Gateway approach,
# which Netlify has deprecated.
backend:
  name: git-gateway
  repo: gDeGiacinto/unmarked-human
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/5cdb608b-5b0a-4f28-9563-f71b2554921b/pkce
  auth_token_endpoint: /sites/5cdb608b-5b0a-4f28-9563-f71b2554921b/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://guydegiacinto.com

publish_mode: simple
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "site"
        label: "BPM-THERAPY Site"
        file: "content/site.json"
        fields:
          - label: "Meta / SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Site Title", name: "siteTitle", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Brand Name", name: "brandName", widget: "string" }

          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Target (anchor)", name: "target", widget: "string" }
              - { label: "Book Button Label", name: "ctaLabel", widget: "string" }
              - { label: "Book Button Target", name: "ctaTarget", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Hero Image", name: "heroImage", widget: "image" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - { label: "Tags", name: "tags", widget: "list" }

          - label: "Live Stream Section"
            name: "stream"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Live Embed URL (YouTube/Twitch)", name: "embedUrl", widget: "string", required: false }
              - { label: "Embed Placeholder Note", name: "embedNote", widget: "string" }
              - label: "Weekly Schedule"
                name: "schedule"
                widget: "list"
                fields:
                  - { label: "Day", name: "day", widget: "string" }
                  - { label: "Time", name: "time", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Status", name: "status", widget: "string" }

          - label: "Music & Mixes Section"
            name: "music"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Featured Embed URL (SoundCloud/Mixcloud)", name: "featuredEmbedUrl", widget: "string", required: false }
              - { label: "Featured Embed Note", name: "featuredEmbedNote", widget: "string" }
              - { label: "Latest Embed URL", name: "latestEmbedUrl", widget: "string", required: false }
              - { label: "Latest Embed Note", name: "latestEmbedNote", widget: "string" }
              - label: "Tracks"
                name: "tracks"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Type", name: "type", widget: "string" }
                  - { label: "BPM", name: "bpm", widget: "string" }
                  - { label: "Key", name: "key", widget: "string" }

          - label: "Video Section"
            name: "video"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - label: "Videos"
                name: "videos"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "YouTube URL", name: "url", widget: "string", required: false }
                  - { label: "Placeholder Note", name: "note", widget: "string" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Body Paragraphs"
                name: "bodyParagraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Gear Tags", name: "gearTags", widget: "list" }

          - label: "Contact & Booking Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Inquiry Types", name: "inquiryTypes", widget: "list" }
              - { label: "Form Note", name: "formNote", widget: "string" }
              - { label: "Confirmation Text", name: "confirmationText", widget: "string" }
              - { label: "Direct Email", name: "directEmail", widget: "string" }
              - { label: "Based In", name: "basedIn", widget: "string" }
              - label: "Socials"
                name: "socials"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand Name", name: "brandName", widget: "string" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }
